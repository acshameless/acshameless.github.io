# Site Information
title: acshameless
description: "Hi, I'm acshameless, an Engineer from China, also dabbling a bit in Swift, Rust, Python, and Sketch. Believing in long-termism, I am passionate about open source and enjoy experimenting with new ideas."
url: https://ac.shameless.top
repo: acshameless/acshameless.github.io
lang: zh-CN
timezone: Asia/Beijing

# Social Media and External URLs
github: acshameless
menu:
  - title: "Categories"
    url: "/categories.html"
  - title: "About"
    url: "/about.html"
  - title: "Daily"
    url: "https://daily.shameless.top/"

# SEO and Analytics
# google_analytics: G-KS7EDB6BRM

# Build Settings
paginate: 10
post_ext: md
page_ext: md
post_layout: post
page_layout: page
titlecase: true
future: true
highlighter: rouge
markdown: kramdown
permalink: /:year-:month-:day/:title.html
sass:
  sass_dir: _sass
  style: compressed

collections:
  posts:
    output: true
    permalink: /:year-:month-:day/:title.html
  posts_en:
    output: true
    permalink: /en/:year-:month-:day/:title.html
    sort_by: date

include: [".htaccess"]
exclude:
  [
    "Gemfile",
    "Gemfile.lock",
    "README.md",
    "LICENSE",
    "package.json",
    "node_modules",
  ]

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-pdf-embed
  - jekyll-sitemap
  - jekyll-feed

# Custom Site Settings
showBuyCoffee: false
